server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files with proper MIME types
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (CSS, JS) for performance
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Disable access log for health checks (Cloud Run sends these frequently)
    location = / {
        access_log off;
        try_files $uri /index.html;
    }

    # Return 404 for missing files instead of falling back
    location ~* \.(png|jpg|ico|svg|woff2?)$ {
        try_files $uri =404;
    }
}
