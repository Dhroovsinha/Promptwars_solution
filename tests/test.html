<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueFlow — Test Suite v2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f1a;
      color: #e8ecf4;
      padding: 2rem;
      line-height: 1.6;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #4285f4, #34a853);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #8892a8; font-size: 0.875rem; margin-bottom: 2rem; }
    .test-group {
      margin-bottom: 1.5rem;
      background: #131a2e;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .test-group__title {
      padding: 0.75rem 1rem;
      font-weight: 600;
      font-size: 0.875rem;
      background: #1a2340;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .test {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .test:last-child { border-bottom: none; }
    .test__icon { font-size: 1rem; flex-shrink: 0; }
    .test__name { flex: 1; }
    .test__status { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
    .pass { color: #34a853; }
    .pass .test__status { background: rgba(52,168,83,0.15); color: #34a853; }
    .fail { color: #ea4335; }
    .fail .test__status { background: rgba(234,67,53,0.15); color: #ea4335; }
    .summary {
      margin-top: 2rem;
      padding: 1rem;
      border-radius: 0.75rem;
      font-weight: 600;
      text-align: center;
    }
    .summary.all-pass { background: rgba(52,168,83,0.15); color: #34a853; border: 1px solid rgba(52,168,83,0.3); }
    .summary.has-fail { background: rgba(234,67,53,0.15); color: #ea4335; border: 1px solid rgba(234,67,53,0.3); }
  </style>
</head>
<body>
  <h1>🧪 VenueFlow Test Suite v2</h1>
  <p class="subtitle">Validates Decision Engine scoring, predictions, trend analysis, assistant intelligence, and data layer.</p>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Load modules under test -->
  <script src="../js/utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/decisionEngine.js"></script>
  <script src="../js/queue.js"></script>
  <script src="../js/assistant.js"></script>

  <script>
    /** Minimal test runner */
    const T = (() => {
      let results = [];
      let currentGroup = '';
      return {
        group(name) { currentGroup = name; },
        assert(name, cond) { results.push({ group: currentGroup, name, passed: !!cond }); },
        assertEqual(name, actual, expected) {
          const passed = actual === expected;
          results.push({ group: currentGroup, name: passed ? name : `${name} — expected "${expected}", got "${actual}"`, passed });
        },
        render() {
          const groups = {};
          results.forEach(r => { if (!groups[r.group]) groups[r.group] = []; groups[r.group].push(r); });
          let html = '';
          Object.entries(groups).forEach(([g, tests]) => {
            html += `<div class="test-group"><div class="test-group__title">${g}</div>`;
            tests.forEach(t => {
              html += `<div class="test ${t.passed ? 'pass' : 'fail'}">
                <span class="test__icon">${t.passed ? '✅' : '❌'}</span>
                <span class="test__name">${t.name}</span>
                <span class="test__status">${t.passed ? 'PASS' : 'FAIL'}</span></div>`;
            });
            html += '</div>';
          });
          document.getElementById('results').innerHTML = html;
          const total = results.length, passed = results.filter(r => r.passed).length, failed = total - passed;
          document.getElementById('summary').innerHTML = `<div class="summary ${failed === 0 ? 'all-pass' : 'has-fail'}">
            ${failed === 0 ? '🎉' : '⚠'} ${passed}/${total} tests passed${failed > 0 ? ` — ${failed} failed` : ' — All clear!'}</div>`;
        },
        getResults() { return results; }
      };
    })();

    // ========================================
    // TESTS
    // ========================================

    // --- VenueUtils ---
    T.group('VenueUtils — Core Utilities');
    T.assertEqual('sanitize() escapes HTML', VenueUtils.sanitize('<b>bold<' + '/b>'), '&lt;b&gt;bold&lt;/b&gt;');
    T.assertEqual('sanitize() preserves text', VenueUtils.sanitize('Hello'), 'Hello');
    T.assertEqual('formatWaitTime() < 1 min', VenueUtils.formatWaitTime(0.5), '< 1 min');
    T.assertEqual('formatWaitTime() 5 min', VenueUtils.formatWaitTime(5), '~5 min');
    T.assertEqual('formatWaitTime() 75 min', VenueUtils.formatWaitTime(75), '~1h 15m');
    T.assertEqual('getQueueLevel() low', VenueUtils.getQueueLevel(2), 'low');
    T.assertEqual('getQueueLevel() med', VenueUtils.getQueueLevel(5), 'med');
    T.assertEqual('getQueueLevel() high', VenueUtils.getQueueLevel(12), 'high');
    T.assert('uid() is unique', VenueUtils.uid() !== VenueUtils.uid());
    T.assert('formatMessage() bold', VenueUtils.formatMessage('**x**').includes('<strong>x</strong>'));
    T.assert('formatMessage() sanitizes', !VenueUtils.formatMessage('<img src=x>').includes('<img'));

    // --- VenueUtils Storage ---
    T.group('VenueUtils — Storage');
    VenueUtils.storage.set('test_k', { a: 1 });
    T.assertEqual('storage roundtrip', JSON.stringify(VenueUtils.storage.get('test_k')), JSON.stringify({ a: 1 }));
    T.assertEqual('storage fallback', VenueUtils.storage.get('nope', 'fb'), 'fb');
    VenueUtils.storage.remove('test_k');
    T.assertEqual('storage remove', VenueUtils.storage.get('test_k', null), null);

    // --- Firebase Demo Data ---
    T.group('FirebaseService — Demo Data & Phases');
    const dq = FirebaseService.generateDemoData('queues');
    T.assert('queues have entries', Object.keys(dq).length >= 9);
    T.assert('queue has name/wait/type', dq.food_north && typeof dq.food_north.wait === 'number');
    T.assert('wait times non-negative', Object.values(dq).every(q => q.wait >= 0));
    T.assert('alerts is an array', Array.isArray(FirebaseService.generateDemoData('alerts')));
    const dc = FirebaseService.generateDemoData('crowd_density');
    T.assert('crowd density has zones', Object.keys(dc).length >= 5);
    T.assert('density values 0-1', Object.values(dc).every(d => d.density >= 0 && d.density <= 1.1));
    const phase = FirebaseService.getCurrentPhase();
    T.assert('phase has label', typeof phase.phaseLabel === 'string' && phase.phaseLabel.length > 0);
    T.assert('phase has multiplier', typeof phase.multiplier === 'number');
    const ep = FirebaseService.generateDemoData('event_phase');
    T.assert('event_phase data has phase', typeof ep.phase === 'string');

    // --- Decision Engine: Scoring ---
    T.group('DecisionEngine — Multi-Factor Scoring');
    const testQueues = {
      food_north: { name: 'Food North', wait: 5, type: 'food' },
      food_south: { name: 'Food South', wait: 12, type: 'food' },
      food_east:  { name: 'Snack East', wait: 2, type: 'food' },
    };
    const testCrowd = {
      north_concourse: { density: 0.8 },
      south_concourse: { density: 0.3 },
      east_concourse:  { density: 0.4 },
    };
    DecisionEngine.setUserZone('north');
    const ranked = DecisionEngine.rankOptions('food', testQueues, testCrowd);
    T.assert('rankOptions returns array', Array.isArray(ranked) && ranked.length === 3);
    T.assert('options are sorted by score desc', ranked[0].score >= ranked[1].score && ranked[1].score >= ranked[2].score);
    T.assert('each option has score 0-100', ranked.every(o => o.score >= 0 && o.score <= 100));
    T.assert('each option has reasoning', ranked.every(o => typeof o.reasoning === 'string' && o.reasoning.length > 0));
    T.assert('best option has badge', ranked[0].badge !== null);
    T.assert('options have waitFormatted', ranked.every(o => typeof o.waitFormatted === 'string'));
    T.assert('options have trend object', ranked.every(o => o.trend && typeof o.trend.direction === 'string'));
    T.assert('options have prediction', ranked.every(o => o.prediction && typeof o.prediction.predicted === 'number'));

    // --- Decision Engine: Scoring changes with user zone ---
    T.group('DecisionEngine — Distance Factor');
    DecisionEngine.setUserZone('north');
    const rankedNorth = DecisionEngine.rankOptions('food', testQueues, testCrowd);
    const northScores = {};
    rankedNorth.forEach(o => northScores[o.id] = o.score);

    DecisionEngine.setUserZone('east');
    const rankedEast = DecisionEngine.rankOptions('food', testQueues, testCrowd);
    const eastScores = {};
    rankedEast.forEach(o => eastScores[o.id] = o.score);

    T.assert('food_east scores higher when user is in east zone',
      eastScores['food_east'] > northScores['food_east'] - 1 // Allow small variance from trend jitter
    );
    T.assert('food_north scores higher when user is in north zone',
      northScores['food_north'] >= eastScores['food_north'] - 1
    );

    // --- Decision Engine: recommend() ---
    T.group('DecisionEngine — Recommendations');
    DecisionEngine.setUserZone('north');
    const best = DecisionEngine.recommend('food', testQueues, testCrowd);
    T.assert('recommend() returns an object', best !== null && typeof best === 'object');
    T.assert('recommend() returns highest scored', best.score === ranked[0].score);
    T.assert('recommend() has name', typeof best.name === 'string');
    const noResult = DecisionEngine.recommend('nonexistent', testQueues, testCrowd);
    T.assertEqual('recommend() null for unknown type', noResult, null);

    // --- Decision Engine: Trends ---
    T.group('DecisionEngine — Trend Analysis');
    // Simulate increasing trend
    for (let i = 0; i < 5; i++) {
      DecisionEngine.recordSnapshot({ test_inc: { name: 'Test', wait: 3 + i * 2, type: 'food' } });
    }
    const incTrend = DecisionEngine.getTrend('test_inc');
    T.assertEqual('increasing wait detected', incTrend.direction, 'increasing');
    T.assert('increasing trend has label', incTrend.label.includes('busier'));

    // Simulate decreasing trend
    for (let i = 0; i < 5; i++) {
      DecisionEngine.recordSnapshot({ test_dec: { name: 'Test', wait: 10 - i * 2, type: 'food' } });
    }
    const decTrend = DecisionEngine.getTrend('test_dec');
    T.assertEqual('decreasing wait detected', decTrend.direction, 'decreasing');
    T.assert('decreasing trend has label', decTrend.label.includes('Clearing'));

    // Stable
    const stableTrend = DecisionEngine.getTrend('never_recorded');
    T.assertEqual('unknown facility = stable', stableTrend.direction, 'stable');

    // --- Decision Engine: Predictions ---
    T.group('DecisionEngine — Predictive Intelligence');
    const pred = DecisionEngine.predictWait('test_inc', 11, 10);
    T.assert('prediction returns predicted value', typeof pred.predicted === 'number');
    T.assert('prediction has confidence', ['high', 'medium', 'low'].includes(pred.confidence));
    T.assert('increasing trend predicts higher wait', pred.predicted >= 11);

    const predDec = DecisionEngine.predictWait('test_dec', 2, 10);
    T.assert('decreasing trend predicts lower/same wait', predDec.predicted <= 3);

    // --- Decision Engine: Sit Report ---
    T.group('DecisionEngine — Intelligence Report');
    DecisionEngine.setUserZone('north');
    const report = DecisionEngine.generateSitReport(testQueues, testCrowd);
    T.assert('report is a string', typeof report === 'string');
    T.assert('report mentions scores', report.includes('score'));
    T.assert('report mentions user zone', report.toLowerCase().includes('north'));

    // --- Decision Engine: Badge Assignment ---
    T.group('DecisionEngine — Badge Logic');
    const badgeRanked = DecisionEngine.rankOptions('food', testQueues, testCrowd);
    T.assert('first option gets "Best Option" badge', badgeRanked[0].badge && badgeRanked[0].badge.includes('Best'));
    const hasFastest = badgeRanked.some(o => o.badge && o.badge.includes('Fastest'));
    const hasLowCrowd = badgeRanked.some(o => o.badge && o.badge.includes('Low Crowd'));
    T.assert('badges include Fastest or Low Crowd', hasFastest || hasLowCrowd || badgeRanked.length <= 1);

    // --- Decision Engine: Weights ---
    T.group('DecisionEngine — Configuration');
    T.assert('weights sum to ~1.0', Math.abs(
      DecisionEngine.WEIGHTS.waitTime + DecisionEngine.WEIGHTS.crowdLevel +
      DecisionEngine.WEIGHTS.distance + DecisionEngine.WEIGHTS.trend - 1.0
    ) < 0.01);
    T.assert('FACILITY_ZONES maps all queues', Object.keys(DecisionEngine.FACILITY_ZONES).length >= 9);

    // --- Async tests (QueueManager + Assistant) ---
    (async () => {
      await FirebaseService.init(null);

      // Mock DOM for QueueManager
      if (!document.getElementById('queue-list')) {
        const d = document.createElement('div'); d.id = 'queue-list'; d.style.display = 'none'; document.body.appendChild(d);
      }
      if (!document.getElementById('alerts-bar')) {
        const d = document.createElement('div'); d.id = 'alerts-bar'; d.className = 'hidden'; d.style.display = 'none';
        d.innerHTML = '<span id="alert-text"></span>'; document.body.appendChild(d);
      }
      if (!document.getElementById('queue-overlay')) {
        const d = document.createElement('div'); d.id = 'queue-overlay'; d.style.display = 'none';
        d.innerHTML = '<div class="queue-overlay__title"></div><div id="queue-list"></div>'; document.body.appendChild(d);
      }

      QueueManager.init();
      await new Promise(r => setTimeout(r, 300));

      // --- QueueManager ---
      T.group('QueueManager — Decision Engine Integration');
      const qBest = QueueManager.findBest('food');
      T.assert('findBest returns scored object', qBest && typeof qBest.score === 'number');
      T.assert('findBest has reasoning', typeof qBest.reasoning === 'string');
      T.assert('findBest has badge', qBest.badge !== null);

      const qRanked = QueueManager.getRanked('restroom');
      T.assert('getRanked returns sorted array', Array.isArray(qRanked) && qRanked.length > 0);
      T.assert('getRanked sorted by score desc', qRanked[0].score >= qRanked[qRanked.length - 1].score);

      const qCrowd = QueueManager.getCrowdDensity();
      T.assert('getCrowdDensity returns data', Object.keys(qCrowd).length > 0);

      const summary = QueueManager.getSummaryForAssistant();
      T.assert('summary includes scores', summary.includes('score'));
      T.assert('summary includes phase', summary.includes('Phase'));

      // --- Assistant ---
      T.group('Assistant — Intelligent Responses');
      Assistant.init(null);
      T.assertEqual('isLive() false without key', Assistant.isLive(), false);

      const foodResp = await Assistant.chat('Where can I get food?');
      T.assert('food response has score', foodResp.includes('score') || foodResp.includes('/100'));
      T.assert('food response has reasoning', foodResp.toLowerCase().includes('recommend') || foodResp.toLowerCase().includes('due to'));

      const restroomResp = await Assistant.chat('I need the restroom');
      T.assert('restroom response mentions restroom', restroomResp.toLowerCase().includes('restroom'));

      const exitResp = await Assistant.chat('Best exit strategy?');
      T.assert('exit response has gate recommendation', exitResp.toLowerCase().includes('gate'));

      const predictResp = await Assistant.chat('What will queues be like in 10 minutes?');
      T.assert('prediction response mentions forecast', predictResp.toLowerCase().includes('forecast') || predictResp.toLowerCase().includes('predict'));

      const helpResp = await Assistant.chat('What can you help with?');
      T.assert('help lists predictions feature', helpResp.toLowerCase().includes('predict'));

      const helloResp = await Assistant.chat('Hello!');
      T.assert('greeting includes phase info', helloResp.toLowerCase().includes('phase'));

      const merchResp = await Assistant.chat('Where can I buy a jersey?');
      T.assert('merch response has trend', merchResp.includes('📈') || merchResp.includes('📉') || merchResp.includes('➡️') || merchResp.toLowerCase().includes('stable'));

      const seatResp = await Assistant.chat('How do I get to Section B?');
      T.assert('seat response has section info', seatResp.toLowerCase().includes('section b') || seatResp.toLowerCase().includes('south'));

      const unknownResp = await Assistant.chat('What is quantum physics?');
      T.assert('unknown query has helpful fallback', unknownResp.toLowerCase().includes('food') || unknownResp.toLowerCase().includes('predict'));

      // --- Render ---
      T.render();
      FirebaseService.destroy();
    })();
  </script>
</body>
</html>
